function localAnalyze(riasecPct){
  const scored=ALL_IDS.map(id=>{
    const w=CAREER_WEIGHTS[id]||{R:2,I:2,A:2,S:2,E:2,C:2};
    let score=0,max=0;
    Object.entries(w).forEach(([c,wt])=>{score+=(riasecPct[c]/100)*wt;max+=wt;});
    return{id,pct:Math.round((score/max)*100)};
  });
  scored.sort((a,b)=>b.pct-a.pct);
  const top5=scored.slice(0,5);
  const sortedR=Object.entries(riasecPct).sort((a,b)=>b[1]-a[1]);
  const dom=sortedR[0][0];
  const summaries={
    R:"Profil practic: dai randament maxim în roluri concrete, hands-on, cu rezultate vizibile.",
    I:"Profil analitic: excelezi în cercetare, rezolvare de probleme complexe și gândire sistemică.",
    A:"Profil creativ: talentul tău estetic și dorința de expresie originală sunt atuuri reale.",
    S:"Profil social: empatia și orientarea spre oameni fac din tine un partener valoros.",
    E:"Profil antreprenorial: ambiția, leadership-ul și persuasiunea sunt calitățile tale definitorii.",
    C:"Profil organizat: rigoarea, precizia și atenția la detalii te fac indispensabil în orice echipă.",
  };
  const fitMap={
    R:"Aliniată cu profilul tău practic și tehnic",
    I:"Potrivită gândirii tale analitice",
    A:"Valorifică creativitatea ta naturală",
    S:"Răspunde orientării tale spre oameni",
    E:"Îți pune în valoare ambiția și leadership-ul",
    C:"Valorifică rigoarea și organizarea ta",
  };
  return{
    profile_summary:(summaries[dom]||summaries.I)+" Acest profil deschide oportunități valoroase în mai multe domenii.",
    dominant_traits:sortedR.slice(0,3).map(([k])=>RIASEC_META[k].name),
    riasec_profile:riasecPct,
    matches:top5.map(m=>{
      const w=CAREER_WEIGHTS[m.id]||{};
      const domCat=Object.entries(w).sort((a,b)=>b[1]-a[1])[0]?.[0]||"I";
      return{id:m.id,pct:m.pct,fit:fitMap[domCat]||"Potrivire cu profilul tău RIASEC"};
    }),
    roadmap:ROADMAP_DB[DOMAIN_CAT[top5[0].id]]||ROADMAP_DB.IT,
    isOffline:true,
  };
}

// ── QR CODE COMPONENT ─────────────────────────────────────────────────────────
function QRCode(){
  const url=window.location.href.split("?")[0];
  const isLocal=url.includes("localhost")||url.includes("127.0.0.1")||url.startsWith("file:");
  if(isLocal)return null;
  const qrSrc=`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(url)}&bgcolor=ffffff&color=1e1b4b&margin=8`;
  return(
    <div style={{position:"fixed",top:16,right:16,zIndex:100,background:"rgba(255,255,255,0.95)",borderRadius:16,padding:12,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",textAlign:"center",backdropFilter:"blur(10px)"}}>
      <img src={qrSrc} alt="QR Code" style={{width:90,height:90,borderRadius:8,display:"block"}}/>
      <div style={{fontSize:9,fontWeight:700,color:"#4f46e5",marginTop:4,letterSpacing:0.5}}>SCANEAZĂ</div>
    </div>
  );
}

// ── PROGRESS BAR ──────────────────────────────────────────────────────────────
function ProgressBar({pct,section}){
  const secs=["Interese","Valori","Stil de lucru","Abilități"];
  return(
    <div style={{padding:"16px 24px 0",background:"rgba(0,0,0,0.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        {secs.map((s,i)=><span key={s} style={{fontSize:10,fontWeight:i<=section?700:400,color:i<=section?"#a78bfa":"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:1}}>{i<section?"✓ ":""}{s}</span>)}
      </div>
      <div style={{height:5,background:"rgba(255,255,255,0.1)",borderRadius:99}}>
        <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#4f46e5,#7c3aed,#a78bfa)",borderRadius:99,transition:"width 0.4s ease"}}/>
      </div>
      <div style={{textAlign:"right",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:4,marginBottom:8}}>{pct}% completat</div>

}

        </div>
      </div>
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",display:"flex",overflowX:"auto"}}>
        {tabs.map((t,i)=><button key={t} onClick={()=>setTab(i)} style={{background:"none",border:"none",padding:"12px 14px",cursor:"pointer",fontWeight:tab===i?700:400,color:tab===i?"#4f46e5":"#6b7280",borderBottom:tab===i?"3px solid #4f46e5":"3px solid transparent",fontSize:13,whiteSpace:"nowrap",transition:"all 0.2s"}}>{t}</button>)}
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"22px 16px"}}>
        {tab===0&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{background:"#fff",borderRadius:16,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}><h2 style={{margin:"0 0 16px",fontSize:16,fontWeight:800,color:"#111827"}}>Profilul tău RIASEC</h2><RiasecChart profile={data?.riasec_profile||{}}/></div>
            <div style={{background:"#fff",borderRadius:16,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
              <h2 style={{margin:"0 0 14px",fontSize:16,fontWeight:800,color:"#111827"}}>Top 3 cariere pentru tine</h2>
              {matches.slice(0,3).map((m,i)=>{const c=DB[m.id];if(!c)return null;return(
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<2?"1px solid #f3f4f6":"none"}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:13,flexShrink:0}}>#{i+1}</div>
                  <span style={{fontSize:24}}>{c.emoji}</span>
                  <div style={{flex:1}}><div style={{fontWeight:700,color:"#111827",fontSize:14}}>{c.name}</div><div style={{color:"#9ca3af",fontSize:11}}>{c.domain}</div></div>
                  <div style={{background:"#ede9fe",color:"#5b21b6",borderRadius:100,padding:"3px 12px",fontWeight:800,fontSize:13,flexShrink:0}}>{m.pct}%</div>
                </div>
              );})}
              <button onClick={()=>setTab(1)} style={{...btnPrimary,width:"100%",marginTop:14,padding:"11px 0",fontSize:14,boxShadow:"none"}}>Vezi toate carierele detaliate →</button>
            </div>
          </div>
        )}
        {tab===1&&<div><p style={{color:"#6b7280",marginBottom:16,fontSize:14}}>Apasă pe o carieră pentru toate detaliile.</p>{matches.map(m=>{const c=DB[m.id];if(!c)return null;return <CareerCard key={m.id} career={c} match={m} expanded={expanded===m.id} onToggle={()=>setExpanded(expanded===m.id?null:m.id)}/>;})}</div>}
        {tab===2&&<FacultiesTab matches={matches}/>}
        {tab===3&&<RoadmapTab roadmap={data?.roadmap||{}}/>}
      </div>
      <div style={{textAlign:"center",padding:"16px 20px 40px"}}><button onClick={onRestart} style={{background:"none",border:"2px solid #e5e7eb",borderRadius:12,padding:"10px 24px",cursor:"pointer",color:"#6b7280",fontWeight:600,fontSize:13}}>🔄 Reîa evaluarea de la zero</button></div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("welcome");
  const [section,setSection]=useState(0);
  const [qIdx,setQIdx]=useState(0);
  const [wsIdx,setWsIdx]=useState(0);
  const [riasec,setRiasec]=useState({});
  const [values,setValues]=useState([]);
  const [ws,setWs]=useState({});
  const [skills,setSkills]=useState([]);
  const [results,setResults]=useState(null);
  const [tab,setTab]=useState(0);
  const [expanded,setExpanded]=useState(null);
  const [loadMsg,setLoadMsg]=useState("");

  useEffect(()=>{
    if(screen!=="loading")return;
    const msgs=["🔍 Analizăm profilul tău RIASEC...","🧠 Identificăm combinația ta de talente...","🎯 Selectăm cele mai potrivite cariere...","🗺️ Construim roadmap-ul tău personalizat..."];
    let i=0;setLoadMsg(msgs[0]);
    const iv=setInterval(()=>{i=(i+1)%msgs.length;setLoadMsg(msgs[i]);},2400);
    return()=>clearInterval(iv);
  },[screen]);

  const getRiasecPct=()=>{
    const t={R:0,I:0,A:0,S:0,E:0,C:0};
    RIASEC_FLAT.forEach(q=>{if(riasec[q.id]!=null)t[q.cat]+=riasec[q.id];});
    const p={};Object.keys(t).forEach(k=>{p[k]=Math.round((t[k]/15)*100);});
    return p;
  };

  const analyze=async()=>{
    setScreen("loading");
    const p=getRiasecPct();
    // Try serverless API (available on Vercel)
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),7000);
      const res=await fetch("/api/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({riasec:p,values,workstyle:Object.values(ws).filter(Boolean),skills:skills.slice(0,8)}),
        signal:ctrl.signal,
      });
      clearTimeout(timer);
      if(res.ok){
        const data=await res.json();
        // Enrich with roadmap locally
        const topId=data.matches?.[0]?.id;
        const roadmap=ROADMAP_DB[DOMAIN_CAT[topId]]||ROADMAP_DB.IT;
        setResults({...data,roadmap,riasec_profile:p});
        setScreen("results");return;
      }
    }catch(e){/* fall through to offline */}
    // Offline fallback — instant local RIASEC algorithm
    setResults(localAnalyze(p));
    setScreen("results");
  };

  const calcPct=()=>{let d=0;if(section===0)d=qIdx;else if(section===1)d=18+values.length;else if(section===2)d=26+wsIdx;else d=30+Math.min(skills.length,9);return Math.min(Math.round((d/39)*100),99);};
  const restart=()=>{setScreen("welcome");setSection(0);setQIdx(0);setWsIdx(0);setRiasec({});setValues([]);setWs({});setSkills([]);setResults(null);setTab(0);setExpanded(null);};
  const handleRate=s=>{const q=RIASEC_FLAT[qIdx];setRiasec(p=>({...p,[q.id]:s}));if(qIdx<RIASEC_FLAT.length-1)setQIdx(qIdx+1);else setSection(1);};
  const toggleValue=id=>setValues(p=>p.includes(id)?p.filter(x=>x!==id):p.length<3?[...p,id]:p);
  const toggleSkill=s=>setSkills(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const handleWs=ans=>{const q=WORKSTYLE_DATA[wsIdx];setWs(p=>({...p,[q.id]:ans}));if(wsIdx<WORKSTYLE_DATA.length-1)setWsIdx(wsIdx+1);else setSection(3);};

  if(screen==="welcome")return <Welcome onStart={()=>setScreen("quiz")}/>;
  if(screen==="loading")return <Loading msg={loadMsg}/>;
  if(screen==="results")return <Results data={results} tab={tab} setTab={setTab} expanded={expanded} setExpanded={setExpanded} onRestart={restart}/>;

  return(
    <div>
      {section===0&&<RiasecScreen q={RIASEC_FLAT[qIdx]} current={riasec[RIASEC_FLAT[qIdx].id]} onRate={handleRate} onBack={()=>qIdx>0&&setQIdx(qIdx-1)} pct={calcPct()} section={0} qNum={qIdx+1}/>}
      {section===1&&<ValuesScreen selected={values} onToggle={toggleValue} onNext={()=>{setSection(2);setWsIdx(0);}} onBack={()=>{setSection(0);setQIdx(RIASEC_FLAT.length-1);}} pct={calcPct()} section={1}/>}
      {section===2&&<WorkStyleScreen q={WORKSTYLE_DATA[wsIdx]} current={ws[WORKSTYLE_DATA[wsIdx].id]} onSelect={handleWs} onBack={()=>wsIdx>0?setWsIdx(wsIdx-1):setSection(1)} pct={calcPct()} section={2} qNum={wsIdx+1}/>}
      {section===3&&<SkillsScreen selected={skills} onToggle={toggleSkill} onFinish={analyze} onBack={()=>{setSection(2);setWsIdx(WORKSTYLE_DATA.length-1);}} pct={calcPct()} section={3}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
